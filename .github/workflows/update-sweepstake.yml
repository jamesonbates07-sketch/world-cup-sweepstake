name: Update Sweepstake Results

on:
  schedule:
    # Run once daily at 06:00 UTC (after the previous day's matches finish)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger from the UI

jobs:
  update-results:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Data and Update results.json
        run: npm run update   # no API key — uses the free public openfootball data

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add results.json
          [ -f history.json ] && git add history.json || true
          git commit -m "Automated match results update [skip ci]" || echo "No changes to commit"
          git push
